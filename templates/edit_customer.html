{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <div>
        <p class="eyebrow">Update Customer</p>
        <h1>Edit Customer</h1>
    </div>
</div>

<form class="form-panel" method="post">
    {% if error %}
    <div class="notice danger">{{ error }}</div>
    {% endif %}

    <label>
        Name
        <input name="name" value="{{ customer.name }}" required>
    </label>

    <label>
        Phone
        <input name="phone" value="{{ customer.phone }}">
    </label>

    <label>
        Email
        <input name="email" type="email" value="{{ customer.email }}">
    </label>

    <div class="form-actions">
        <a class="btn ghost" href="/customers">Cancel</a>
        <button type="submit">Update Customer</button>
    </div>
</form>
{% endblock %}
