{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <div>
        <p class="eyebrow">New Item</p>
        <h1>Add Product</h1>
    </div>
</div>

<form class="form-panel" method="post" enctype="multipart/form-data">
    <label>
        Product Name
        <input name="product_name" placeholder="Cyberpunk 2077" required>
    </label>

    <label>
        Product Image
        <input name="product_image" type="file" accept="image/*">
    </label>

    <label>
        Price
        <input name="price" type="number" step="0.01" placeholder="1590" required>
    </label>

    <label>
        Stock
        <input name="stock" type="number" placeholder="25" required>
    </label>

    <label>
        Category
        <select name="category_id">
            {% for c in categories %}
            <option value="{{ c.category_id }}">{{ c.category_name }}</option>
            {% endfor %}
        </select>
    </label>

    <div class="form-actions">
        <a class="btn ghost" href="/products">Cancel</a>
        <button type="submit">Save Product</button>
    </div>
</form>
{% endblock %}
